<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>下班倒计时</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #fff7e8;
      --bg-bottom: #ffe0b5;
      --card: rgba(255, 250, 242, 0.88);
      --text: #2d2118;
      --muted: #775f4b;
      --accent: #d66a2a;
      --accent-soft: rgba(214, 106, 42, 0.12);
      --shadow: 0 24px 60px rgba(126, 79, 36, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 32%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    .card {
      width: min(92vw, 720px);
      padding: 40px 28px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .age-label {
      margin: 0 auto 8px;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    .years-left-label {
      margin: 0 auto 16px;
      font-size: 18px;
      color: var(--muted);
    }

    .equivalent-date-label {
      margin: 0 auto 16px;
      font-size: 16px;
      color: var(--text);
    }

    .birth-input {
      margin: 16px auto 0;
      padding: 10px 12px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 12px;
      font-size: 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
      width: 200px;
      max-width: 90%;
    }

    .birth-input:focus {
      outline: 2px solid rgba(214, 106, 42, 0.25);
      border-color: var(--accent);
    }

    .weekday {
      margin: 0 auto 16px;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(214, 106, 42, 0.14);
      box-shadow: inset 0 0 0 1px rgba(214, 106, 42, 0.16);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .date-label {
      margin: 0 auto 14px;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(45, 33, 24, 0.06);
      box-shadow: inset 0 0 0 1px rgba(45, 33, 24, 0.08);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .year-progress {
      margin: 0 auto 20px;
      max-width: 420px;
      text-align: center;
    }

    .year-progress-text {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .year-progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(45, 33, 24, 0.1);
      box-shadow: inset 0 0 0 1px rgba(45, 33, 24, 0.05);
    }

    .year-progress-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f0a16d, var(--accent));
      transition: width 0.3s ease;
    }

    .clock-widget {
      margin: 0 auto 24px;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      position: relative;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.95) 0 54%, rgba(249, 230, 209, 0.95) 55% 100%);
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.85),
        inset 0 0 0 16px rgba(214, 106, 42, 0.08),
        0 18px 38px rgba(126, 79, 36, 0.18);
    }

    .clock-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .clock-number {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 30px;
      height: 30px;
      margin-left: -15px;
      margin-top: -15px;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 800;
      color: #6e4529;
      transform: translate(var(--number-x), var(--number-y));
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 18px;
      margin-left: -2px;
      margin-top: -115px;
      border-radius: 999px;
      background: rgba(45, 33, 24, 0.45);
      transform-origin: center 115px;
    }

    .tick.major {
      height: 28px;
      margin-top: -120px;
      background: var(--accent);
      transform-origin: center 120px;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: center bottom;
      border-radius: 999px;
    }

    .hand.hour {
      width: 8px;
      height: 62px;
      margin-left: -4px;
      background: #5a3a26;
    }

    .hand.minute {
      width: 6px;
      height: 88px;
      margin-left: -3px;
      background: #7a4a2c;
    }

    .hand.second {
      width: 3px;
      height: 96px;
      margin-left: -1.5px;
      background: #d14b38;
    }

    .clock-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      margin-top: -9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(255, 247, 232, 0.95);
    }

    .controls {
      margin: 24px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.56);
    }

    .controls label {
      font-size: 15px;
      color: var(--muted);
    }

    .controls input {
      width: 96px;
      padding: 10px 12px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .controls input:focus {
      outline: 2px solid rgba(214, 106, 42, 0.25);
      border-color: var(--accent);
    }

    .count {
      margin: 28px 0 18px;
      padding: 24px 18px;
      border-radius: 22px;
      background: var(--accent-soft);
      line-height: 1.15;
    }

    .count-text {
      white-space: nowrap;
      font-size: clamp(0.5rem, 2.5vw, 1rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 16px;
      }

      .count {
        padding: 18px 12px;
      }

       .count-text {
         font-size: clamp(0.75rem, 3vw, 1.5rem);
       }
    }

    .dots {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      min-height: 34px;
    }

    .dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ef9a61, var(--accent));
      box-shadow: 0 6px 14px rgba(214, 106, 42, 0.22);
    }

    .status {
      margin: 28px 0 0;
      font-size: 18px;
      color: var(--muted);
    }

    .clock {
      margin-top: 18px;
      font-size: 15px;
      color: var(--muted);
    }

    .zone-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 2px dashed rgba(119, 95, 75, 0.2);
    }

    .zone-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .zone-header input {
      width: 140px;
      padding: 8px 12px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .zone-header input:focus {
      outline: 2px solid rgba(214, 106, 42, 0.25);
      border-color: var(--accent);
    }

    .add-zone-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    .add-zone-btn:hover {
      background: #c55a1f;
    }

    .zones-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .zone {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(119, 95, 75, 0.15);
      min-width: 100px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .zone-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .zone-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      min-height: 34px;
    }

    .zone-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ef9a61, var(--accent));
      box-shadow: 0 6px 14px rgba(214, 106, 42, 0.22);
      cursor: grab;
    }

    .zone-dot:active {
      cursor: grabbing;
    }

    .zone-dot.dragging {
      opacity: 0.5;
    }

    .zone-count {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .unassigned-dots {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      border: 2px dashed rgba(119, 95, 75, 0.2);
      transition: all 0.2s ease;
    }

    .unassigned-dots.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .unassigned-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .unassigned-dots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      min-height: 34px;
    }

    .unassigned-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ef9a61, var(--accent));
      box-shadow: 0 6px 14px rgba(214, 106, 42, 0.22);
      cursor: grab;
    }

    .unassigned-dot:active {
      cursor: grabbing;
    }

    .unassigned-dot.dragging {
      opacity: 0.5;
    }

    .delete-zone-btn {
      margin-top: 8px;
      padding: 4px 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      background: #d14b38;
      cursor: pointer;
    }

    .delete-zone-btn:hover {
      background: #b8392a;
    }

    .countdown-days-section {
      margin-top: 4px;
    }

    .countdown-days-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      justify-content: center;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .countdown-days-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .countdown-days-header input[type="text"] {
      width: 100px;
      padding: 6px 10px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .countdown-days-header input[type="date"] {
      padding: 6px 10px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .countdown-days-header input:focus {
      outline: 2px solid rgba(214, 106, 42, 0.25);
      border-color: var(--accent);
    }

    .add-countdown-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
    }

    .add-countdown-btn:hover {
      background: #c55a1f;
    }

    .countdown-days-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      justify-content: center;
      margin-top: 12px;
    }

    .countdown-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .countdown-item-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .countdown-item-days {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    .countdown-item-days.past {
      color: #7a9a3d;
    }

    .countdown-item-date {
      font-size: 14px;
      color: var(--muted);
    }

    .delete-countdown-btn {
      padding: 2px 6px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      color: #fff;
      background: #d14b38;
      cursor: pointer;
    }

    .delete-countdown-btn:hover {
      background: #b8392a;
    }

    .edit-countdown-btn {
      padding: 2px 6px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      color: #fff;
      background: #3d6a8a;
      cursor: pointer;
    }

    .edit-countdown-btn:hover {
      background: #2d5a7a;
    }

    .countdown-edit-form {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .countdown-edit-form input[type="text"] {
      width: 60px;
      padding: 2px 6px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .countdown-edit-form input[type="date"] {
      padding: 2px 6px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
    }

    .countdown-edit-form button {
      padding: 2px 6px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      color: #fff;
      cursor: pointer;
    }

    .countdown-edit-form .save-btn {
      background: #5a8a3d;
    }

    .countdown-edit-form .cancel-btn {
      background: #8a6a3d;
    }

    .countdown-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .countdown-item-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .countdown-item-days {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    .countdown-item-days.past {
      color: #7a9a3d;
    }

    .countdown-item-date {
      font-size: 14px;
      color: var(--muted);
    }

    .delete-countdown-btn {
      padding: 2px 6px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      color: #fff;
      background: #d14b38;
      cursor: pointer;
    }

    .delete-countdown-btn:hover {
      background: #b8392a;
    }

    .data-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px dashed rgba(119, 95, 75, 0.2);
    }

    .data-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .data-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #5a8a3d;
      cursor: pointer;
    }

    .data-btn:hover {
      background: #4a7534;
    }

    .data-btn.import-btn {
      background: #3d6a8a;
    }

    .data-btn.import-btn:hover {
      background: #2d5a7a;
    }

    .data-btn.google-drive-btn {
      background: #4285f4;
    }

    .data-btn.google-drive-btn:hover {
      background: #3367d6;
    }

    .gdrive-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .gdrive-modal {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .gdrive-modal h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--text);
    }

    .gdrive-modal p {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .gdrive-modal input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(119, 95, 75, 0.25);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.95);
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .gdrive-modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .gdrive-modal-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .gdrive-modal-btn.confirm-btn {
      color: #fff;
      background: #4285f4;
    }

    .gdrive-modal-btn.cancel-btn {
      color: var(--text);
      background: rgba(119, 95, 75, 0.15);
    }

    .import-input {
      display: none;
    }
  </style>
</head>
    <body>
      <main class="card">
        <p class="age-label" id="ageLabel">当前年龄: --岁</p>
        <p class="years-left-label" id="yearsLeftLabel">距离45岁还剩 --年</p>
        <div class="countdown-days-section">
          <div class="countdown-days-list" id="countdownDaysList"></div>
        </div>
        <p class="equivalent-date-label" id="equivalentDateLabel">相当于 --年--月--日</p>
        <p class="date-label" id="dateLabel">今天是 2026-03-25</p>
        <p class="weekday" id="weekdayLabel">周一</p>
    <div class="year-progress" aria-label="今年进度">
      <p class="year-progress-text" id="yearProgressText">今年已过去 0.00%</p>
      <div class="year-progress-track">
        <div class="year-progress-fill" id="yearProgressFill"></div>
      </div>
    </div>
    <div class="clock-widget" aria-label="当前真实时间时钟">
      <div class="clock-face" id="clockFace"></div>
      <div class="hand hour" id="hourHand"></div>
      <div class="hand minute" id="minuteHand"></div>
      <div class="hand second" id="secondHand"></div>
      <div class="clock-center"></div>
    </div>
    <div class="count">
      <div class="count-text" id="countLabel">还剩 0 个10分钟</div>
      <div class="dots" id="dotsContainer" aria-label="剩余份数圆点"></div>
    </div>
    <div class="controls">
      <label for="unitInput">每份分钟数</label>
      <input id="unitInput" type="number" min="1" step="1" value="10" inputmode="numeric">
    </div>
    <p class="status" id="statusLabel">上午按 12:00 计算，下午按 18:00 计算</p>
    <p class="clock" id="clockLabel">当前时间：--:--:--</p>
    <div>
      <label for="birthInput" class="eyebrow">出生日期</label>
      <input id="birthInput" type="date" class="birth-input">
    </div>
    <div class="zone-section">
      <div class="zone-header">
        <input id="zoneNameInput" type="text" placeholder="区域名称">
        <button class="add-zone-btn" id="addZoneBtn">添加区域</button>
      </div>
      <div class="zones-container" id="zonesContainer"></div>
      <div class="unassigned-dots" id="unassignedDots">
        <p class="unassigned-label">未分配时间块</p>
        <div class="unassigned-dots-container" id="unassignedDotsContainer"></div>
      </div>
    </div>
    <div class="data-section">
      <div class="countdown-days-header">
        <input id="countdownNameInput" type="text" placeholder="名称">
        <input id="countdownDateInput" type="date">
        <button class="add-countdown-btn" id="addCountdownBtn">添加</button>
      </div>
      <div class="data-buttons">
        <button class="data-btn" id="exportBtn">导出数据</button>
        <button class="data-btn google-drive-btn" id="exportGDriveBtn">导出到Google Drive</button>
        <button class="data-btn import-btn" id="importBtn">导入数据</button>
        <input type="file" id="importInput" class="import-input" accept=".json">
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "countdown-unit-minutes";
    const BIRTH_STORAGE_KEY = "countdown-birthdate";
    const ZONES_STORAGE_KEY = "countdown-zones";
    const COUNTDOWNS_STORAGE_KEY = "countdown-days";

    let zones = [];
    let countdowns = [];
    let draggedDot = null;
    let draggedFromZone = null;

    function formatTime(date) {
      return date.toLocaleTimeString("zh-CN", { hour12: false });
    }

    function formatWeekday(date) {
      const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return weekdayNames[date.getDay()];
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return "今天是 " + year + "-" + month + "-" + day;
    }

    function getYearProgress(date) {
      const yearStart = new Date(date.getFullYear(), 0, 1, 0, 0, 0, 0);
      const nextYearStart = new Date(date.getFullYear() + 1, 0, 1, 0, 0, 0, 0);
      const progress = ((date - yearStart) / (nextYearStart - yearStart)) * 100;
      return Math.min(100, Math.max(0, progress));
    }

    function buildClockTicks() {
      const clockFace = document.getElementById("clockFace");
      if (clockFace.childElementCount > 0) {
        return;
      }

      for (let index = 0; index < 60; index += 1) {
        const tick = document.createElement("span");
        tick.className = index % 5 === 0 ? "tick major" : "tick";
        tick.style.transform = "rotate(" + (index * 6) + "deg)";
        tick.setAttribute("aria-hidden", "true");
        clockFace.appendChild(tick);
      }

      for (let hour = 1; hour <= 12; hour += 1) {
        const angle = ((hour % 12) * 30 - 90) * Math.PI / 180;
        const radius = 86;
        const number = document.createElement("span");
        number.className = "clock-number";
        number.textContent = String(hour);
        number.style.setProperty("--number-x", (Math.cos(angle) * radius) + "px");
        number.style.setProperty("--number-y", (Math.sin(angle) * radius) + "px");
        number.setAttribute("aria-hidden", "true");
        clockFace.appendChild(number);
      }
    }

    function updateClockHands(date) {
      const hourHand = document.getElementById("hourHand");
      const minuteHand = document.getElementById("minuteHand");
      const secondHand = document.getElementById("secondHand");
      const seconds = date.getSeconds();
      const minutes = date.getMinutes();
      const hours = date.getHours() % 12;
      const secondAngle = seconds * 6;
      const minuteAngle = (minutes + seconds / 60) * 6;
      const hourAngle = (hours + minutes / 60 + seconds / 3600) * 30;

      hourHand.style.transform = "rotate(" + hourAngle + "deg)";
      minuteHand.style.transform = "rotate(" + minuteAngle + "deg)";
      secondHand.style.transform = "rotate(" + secondAngle + "deg)";
    }

    function getDayTarget(now) {
      const noon = new Date(now);
      noon.setHours(12, 0, 0, 0);

      const evening = new Date(now);
      evening.setHours(18, 0, 0, 0);

      if (now < noon) {
        return {
          label: "距离 12:00 下班",
          target: noon,
          detail: "上午时段，目标时间是 12:00"
        };
      }

      if (now < evening) {
        return {
          label: "距离 18:00 下班",
          target: evening,
          detail: "下午时段，目标时间是 18:00"
        };
      }

      return {
        label: "今天已经下班",
        target: null,
        detail: "当前时间已到或超过 18:00"
      };
    }

    function getUnitMinutes() {
      const input = document.getElementById("unitInput");
      const value = Number(input.value);
      if (!Number.isFinite(value) || value <= 0) {
        return null;
      }

      return Math.floor(value);
    }

    function loadStoredUnitMinutes() {
      const storedValue = window.localStorage.getItem(STORAGE_KEY);
      const parsedValue = Number(storedValue);
      if (!Number.isFinite(parsedValue) || parsedValue <= 0) {
        return 10;
      }

      return Math.floor(parsedValue);
    }

    function saveUnitMinutes() {
      const unitMinutes = getUnitMinutes();
      if (!unitMinutes) {
        return;
      }

      window.localStorage.setItem(STORAGE_KEY, String(unitMinutes));
    }

    function getBirthDate() {
      const input = document.getElementById("birthInput");
      const value = input.value;
      if (!value) {
        return null;
      }
      return new Date(value);
    }

    function loadStoredBirthDate() {
      const storedValue = window.localStorage.getItem(BIRTH_STORAGE_KEY);
      if (!storedValue) {
        return null;
      }
      return new Date(storedValue);
    }

    function saveBirthDate() {
      const birthDate = getBirthDate();
      if (!birthDate) {
        return;
      }
      window.localStorage.setItem(BIRTH_STORAGE_KEY, birthDate.toISOString());
    }

    function calculateAge(birthDate, now) {
      const ageMs = now - birthDate;
      const ageYears = ageMs / (1000 * 60 * 60 * 24 * 365.25); // Account for leap years
      return ageYears;
    }

    function formatAge(ageYears) {
      return ageYears.toFixed(1);
    }

    function yearsUntilTarget(birthDate, targetAge, now) {
      const currentAge = calculateAge(birthDate, now);
      if (currentAge >= targetAge) {
        return 0;
      }
      return targetAge - currentAge;
    }

    function loadZones() {
      const storedValue = window.localStorage.getItem(ZONES_STORAGE_KEY);
      if (!storedValue) {
        return [];
      }
      try {
        return JSON.parse(storedValue);
      } catch (e) {
        return [];
      }
    }

    function saveZones() {
      window.localStorage.setItem(ZONES_STORAGE_KEY, JSON.stringify(zones));
    }

    function addZone(name) {
      if (!name.trim()) {
        return;
      }
      zones.push({ name: name.trim(), dots: [] });
      saveZones();
      renderZones();
    }

    function deleteZone(index) {
      const removedDots = zones[index].dots;
      zones.splice(index, 1);
      saveZones();
      renderZones();
    }

    function renderZones() {
      const container = document.getElementById("zonesContainer");
      container.replaceChildren();

      zones.forEach((zone, index) => {
        const zoneEl = document.createElement("div");
        zoneEl.className = "zone";
        zoneEl.dataset.zoneIndex = index;

        const nameEl = document.createElement("div");
        nameEl.className = "zone-name";
        nameEl.textContent = zone.name;

        const dotsEl = document.createElement("div");
        dotsEl.className = "zone-dots";

        zone.dots.forEach((dotId, dotIndex) => {
          const dotEl = document.createElement("span");
          dotEl.className = "zone-dot";
          dotEl.draggable = true;
          dotEl.dataset.dotId = dotId;
          dotEl.dataset.zoneIndex = index;
          dotEl.dataset.dotIndexInZone = dotIndex;

          dotEl.addEventListener("dragstart", handleDragStart);
          dotEl.addEventListener("dragend", handleDragEnd);
          dotsEl.appendChild(dotEl);
        });

        const countEl = document.createElement("div");
        countEl.className = "zone-count";
        countEl.textContent = zone.dots.length + "个时间块";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-zone-btn";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", function () {
          deleteZone(index);
        });

        zoneEl.appendChild(nameEl);
        zoneEl.appendChild(dotsEl);
        zoneEl.appendChild(countEl);
        zoneEl.appendChild(deleteBtn);

        zoneEl.addEventListener("dragover", handleDragOver);
        zoneEl.addEventListener("dragleave", handleDragLeave);
        zoneEl.addEventListener("drop", handleDrop);

        container.appendChild(zoneEl);
      });
    }

    function handleDragStart(e) {
      draggedDot = e.target;
      draggedFromZone = e.target.dataset.zoneIndex;
      e.target.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }

    function handleDragEnd(e) {
      e.target.classList.remove("dragging");
      document.querySelectorAll(".zone").forEach(z => z.classList.remove("drag-over"));
      draggedDot = null;
      draggedFromZone = null;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(e) {
      e.currentTarget.classList.remove("drag-over");
    }

    function handleDrop(e) {
      e.preventDefault();
      const targetZone = e.currentTarget;
      targetZone.classList.remove("drag-over");

      const targetZoneIndex = parseInt(targetZone.dataset.zoneIndex, 10);
      const dotId = draggedDot.dataset.dotId;

      if (draggedFromZone !== undefined && draggedFromZone !== null) {
        const fromZoneIndex = parseInt(draggedFromZone, 10);
        zones[fromZoneIndex].dots = zones[fromZoneIndex].dots.filter(id => id !== dotId);
      }

      zones[targetZoneIndex].dots.push(dotId);
      saveZones();
      renderZones();
      renderUnassignedDots();
    }

    function renderUnassignedDots() {
      const container = document.getElementById("unassignedDotsContainer");
      const unassignedSection = document.getElementById("unassignedDots");
      const unitMinutes = getUnitMinutes();
      const targetInfo = getDayTarget(new Date());

      // Add drag event listeners to unassigned section
      unassignedSection.addEventListener("dragover", function(e) {
        e.preventDefault();
        unassignedSection.classList.add("drag-over");
      });
      unassignedSection.addEventListener("dragleave", function(e) {
        unassignedSection.classList.remove("drag-over");
      });
      unassignedSection.addEventListener("drop", function(e) {
        e.preventDefault();
        unassignedSection.classList.remove("drag-over");
        
        if (draggedDot) {
          const dotId = draggedDot.dataset.dotId;
          
          // Remove from zone if it was in one
          if (draggedFromZone !== undefined && draggedFromZone !== null) {
            const fromZoneIndex = parseInt(draggedFromZone, 10);
            zones[fromZoneIndex].dots = zones[fromZoneIndex].dots.filter(id => id !== dotId);
          }
          
          saveZones();
          renderZones();
          renderUnassignedDots();
        }
      });

      if (!unitMinutes || !targetInfo.target) {
        container.replaceChildren();
        return;
      }

      const now = new Date();
      const minutesLeft = Math.max(0, Math.floor((targetInfo.target - now) / 60000));
      const totalDots = Math.floor(minutesLeft / unitMinutes);

      const assignedDotIds = new Set();
      zones.forEach(zone => {
        zone.dots.forEach(id => assignedDotIds.add(id));
      });

      container.replaceChildren();

      for (let i = 0; i < totalDots; i++) {
        const dotId = "dot-" + i;
        if (assignedDotIds.has(dotId)) {
          continue;
        }

        const dotEl = document.createElement("span");
        dotEl.className = "unassigned-dot";
        dotEl.draggable = true;
        dotEl.dataset.dotId = dotId;

        dotEl.addEventListener("dragstart", handleDragStart);
        dotEl.addEventListener("dragend", handleDragEnd);

        container.appendChild(dotEl);
      }
    }

    function renderDots(count) {
      const dotsContainer = document.getElementById("dotsContainer");
      dotsContainer.replaceChildren();

      for (let index = 0; index < count; index += 1) {
        const dot = document.createElement("span");
        dot.className = "dot";
        dot.setAttribute("aria-hidden", "true");
        dotsContainer.appendChild(dot);
      }
    }

    function formatBlocks(blocks) {
      if (Number.isInteger(blocks)) {
        return String(blocks);
      }

      return blocks.toFixed(1);
    }

    function loadCountdowns() {
      const storedValue = window.localStorage.getItem(COUNTDOWNS_STORAGE_KEY);
      if (!storedValue) {
        return [];
      }
      try {
        return JSON.parse(storedValue);
      } catch (e) {
        return [];
      }
    }

    function saveCountdowns() {
      window.localStorage.setItem(COUNTDOWNS_STORAGE_KEY, JSON.stringify(countdowns));
    }

    function addCountdown(name, dateStr) {
      if (!name.trim() || !dateStr) {
        return;
      }
      countdowns.push({ name: name.trim(), date: dateStr });
      saveCountdowns();
      renderCountdowns();
    }

    function deleteCountdown(index) {
      countdowns.splice(index, 1);
      saveCountdowns();
      renderCountdowns();
    }

    function startEditCountdown(index) {
      renderCountdowns(index);
    }

    function saveEditCountdown(index, name, dateStr) {
      if (!name.trim() || !dateStr) {
        return;
      }
      countdowns[index] = { name: name.trim(), date: dateStr };
      saveCountdowns();
      renderCountdowns();
    }

    function startEditCountdown(index) {
      renderCountdowns(index);
    }

    function saveEditCountdown(index, name, dateStr) {
      if (!name.trim() || !dateStr) {
        return;
      }
      countdowns[index] = { name: name.trim(), date: dateStr };
      saveCountdowns();
      renderCountdowns();
    }

    function renderCountdowns(editIndex) {
      const container = document.getElementById("countdownDaysList");
      container.replaceChildren();

      const now = new Date();
      now.setHours(0, 0, 0, 0);

      countdowns.forEach((item, index) => {
        if (editIndex === index) {
          const formEl = document.createElement("div");
          formEl.className = "countdown-edit-form";

          const nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.value = item.name;

          const dateInput = document.createElement("input");
          dateInput.type = "date";
          dateInput.value = item.date;

          const saveBtn = document.createElement("button");
          saveBtn.className = "save-btn";
          saveBtn.textContent = "保存";
          saveBtn.addEventListener("click", function () {
            saveEditCountdown(index, nameInput.value, dateInput.value);
          });

          const cancelBtn = document.createElement("button");
          cancelBtn.className = "cancel-btn";
          cancelBtn.textContent = "取消";
          cancelBtn.addEventListener("click", function () {
            renderCountdowns();
          });

          formEl.appendChild(nameInput);
          formEl.appendChild(dateInput);
          formEl.appendChild(saveBtn);
          formEl.appendChild(cancelBtn);
          container.appendChild(formEl);
          return;
        }

        const targetDate = new Date(item.date);
        targetDate.setHours(0, 0, 0, 0);

        const diffTime = targetDate - now;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const itemEl = document.createElement("div");
        itemEl.className = "countdown-item";

        const nameEl = document.createElement("div");
        nameEl.className = "countdown-item-name";
        nameEl.textContent = item.name;

        const daysEl = document.createElement("div");
        daysEl.className = "countdown-item-days";
        if (diffDays > 0) {
          daysEl.textContent = "还剩 " + diffDays + " 天";
        } else if (diffDays === 0) {
          daysEl.textContent = "就是今天!";
        } else {
          daysEl.classList.add("past");
          daysEl.textContent = "已过 " + Math.abs(diffDays) + " 天";
        }

        const dateEl = document.createElement("div");
        dateEl.className = "countdown-item-date";
        const month = String(targetDate.getMonth() + 1).padStart(2, "0");
        const day = String(targetDate.getDate()).padStart(2, "0");
        dateEl.textContent = month + "-" + day;

        const editBtn = document.createElement("button");
        editBtn.className = "edit-countdown-btn";
        editBtn.textContent = "编辑";
        editBtn.addEventListener("click", function () {
          startEditCountdown(index);
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-countdown-btn";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", function () {
          deleteCountdown(index);
        });

        itemEl.appendChild(nameEl);
        itemEl.appendChild(daysEl);
        itemEl.appendChild(dateEl);
        itemEl.appendChild(editBtn);
        itemEl.appendChild(deleteBtn);

        container.appendChild(itemEl);
      });
    }

    function updateView() {
      const now = new Date();
      const targetInfo = getDayTarget(now);
      const countLabel = document.getElementById("countLabel");
      const statusLabel = document.getElementById("statusLabel");
      const clockLabel = document.getElementById("clockLabel");
      const dateLabel = document.getElementById("dateLabel");
      const weekdayLabel = document.getElementById("weekdayLabel");
      const yearProgressText = document.getElementById("yearProgressText");
      const yearProgressFill = document.getElementById("yearProgressFill");
      const ageLabel = document.getElementById("ageLabel");
      const yearsLeftLabel = document.getElementById("yearsLeftLabel");
      const unitMinutes = getUnitMinutes();
      const yearProgress = getYearProgress(now);
      const birthDate = loadStoredBirthDate() || getBirthDate();

      dateLabel.textContent = formatDate(now);
      weekdayLabel.textContent = formatWeekday(now);
      yearProgressText.textContent = "今年已过去 " + yearProgress.toFixed(2) + "%";
      yearProgressFill.style.width = yearProgress.toFixed(2) + "%";
      clockLabel.textContent = "当前时间：" + formatTime(now);
      updateClockHands(now);

       // Update age information
       if (birthDate) {
         const ageYears = calculateAge(birthDate, now);
         ageLabel.textContent = "当前年龄: " + formatAge(ageYears) + "岁";
         const yearsLeft = yearsUntilTarget(birthDate, 45, now);
         if (yearsLeft > 0) {
           yearsLeftLabel.textContent = "距离45岁还剩 " + yearsLeft.toFixed(1) + "年";
           
           // Calculate equivalent date
           const equivalentDate = new Date(now);
           equivalentDate.setFullYear(equivalentDate.getFullYear() - Math.floor(yearsLeft));
           equivalentDate.setMonth(now.getMonth());
           equivalentDate.setDate(now.getDate());
           
           const eqYear = equivalentDate.getFullYear();
           const eqMonth = String(equivalentDate.getMonth() + 1).padStart(2, "0");
           const eqDay = String(equivalentDate.getDate()).padStart(2, "0");
           document.getElementById("equivalentDateLabel").textContent = "相当于 " + eqYear + "年" + eqMonth + "月" + eqDay + "日";
         } else {
           yearsLeftLabel.textContent = "已达到或超过45岁";
           document.getElementById("equivalentDateLabel").textContent = "";
         }
       } else {
         ageLabel.textContent = "当前年龄: --岁";
         yearsLeftLabel.textContent = "距离45岁还剩 --年";
         document.getElementById("equivalentDateLabel").textContent = "";
       }

      if (!unitMinutes) {
        countLabel.textContent = "请输入大于0的分钟数";
        statusLabel.textContent = "输入框改成 10、25 这类正整数后会立刻生效";
        renderDots(0);
        return;
      }

      if (!targetInfo.target) {
        countLabel.textContent = "已经下班了";
        statusLabel.textContent = targetInfo.detail + "，当前按每份 " + unitMinutes + " 分钟显示";
        renderDots(0);
        return;
      }

      const minutesLeft = Math.max(0, Math.floor((targetInfo.target - now) / 60000));
      const blocks = minutesLeft / unitMinutes;
      countLabel.textContent = "离下班还剩 " + formatBlocks(blocks) + " 个" + unitMinutes + "分钟";
      statusLabel.textContent = targetInfo.detail + "，剩余总分钟数约为 " + minutesLeft + " 分钟";
      renderDots(Math.floor(blocks));
      renderUnassignedDots();
      renderZones();
    }

    buildClockTicks();
    document.getElementById("unitInput").value = String(loadStoredUnitMinutes());
    // Load and set birth date if available
    const storedBirth = loadStoredBirthDate();
    if (storedBirth) {
      document.getElementById("birthInput").valueAsDate = storedBirth;
    }
    // Load zones
    zones = loadZones();
    renderZones();
    // Load countdowns
    countdowns = loadCountdowns();
    renderCountdowns();
    updateView();
    setInterval(updateView, 1000);
    document.getElementById("unitInput").addEventListener("input", function () {
      saveUnitMinutes();
      updateView();
    });
    document.getElementById("birthInput").addEventListener("change", function () {
      saveBirthDate();
      updateView();
    });

    document.getElementById("addZoneBtn").addEventListener("click", function () {
      const input = document.getElementById("zoneNameInput");
      addZone(input.value);
      input.value = "";
    });

    document.getElementById("zoneNameInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        const input = document.getElementById("zoneNameInput");
        addZone(input.value);
        input.value = "";
      }
    });

    document.getElementById("addCountdownBtn").addEventListener("click", function () {
      const nameInput = document.getElementById("countdownNameInput");
      const dateInput = document.getElementById("countdownDateInput");
      addCountdown(nameInput.value, dateInput.value);
      nameInput.value = "";
      dateInput.value = "";
    });

    document.getElementById("countdownNameInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        const nameInput = document.getElementById("countdownNameInput");
        const dateInput = document.getElementById("countdownDateInput");
        addCountdown(nameInput.value, dateInput.value);
        nameInput.value = "";
        dateInput.value = "";
      }
    });

    function exportData() {
      const data = {
        unitMinutes: loadStoredUnitMinutes(),
        birthDate: window.localStorage.getItem(BIRTH_STORAGE_KEY),
        zones: zones,
        countdowns: countdowns,
        exportTime: new Date().toISOString()
      };
      const jsonStr = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "workday-dashboard-backup-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData(jsonStr) {
      try {
        const data = JSON.parse(jsonStr);
        if (data.unitMinutes) {
          window.localStorage.setItem(STORAGE_KEY, String(data.unitMinutes));
          document.getElementById("unitInput").value = String(data.unitMinutes);
        }
        if (data.birthDate) {
          window.localStorage.setItem(BIRTH_STORAGE_KEY, data.birthDate);
          const birthDate = new Date(data.birthDate);
          document.getElementById("birthInput").valueAsDate = birthDate;
        }
        if (Array.isArray(data.zones)) {
          zones = data.zones;
          saveZones();
          renderZones();
        }
        if (Array.isArray(data.countdowns)) {
          countdowns = data.countdowns;
          saveCountdowns();
          renderCountdowns();
        }
        updateView();
        alert("导入成功！");
      } catch (e) {
        alert("导入失败，文件格式不正确");
      }
    }

    document.getElementById("exportBtn").addEventListener("click", exportData);

    const GDRIVE_CLIENT_ID_KEY = "gdrive-client-id";

    document.getElementById("exportGDriveBtn").addEventListener("click", function () {
      const storedClientId = window.localStorage.getItem(GDRIVE_CLIENT_ID_KEY);
      showGDriveModal(storedClientId);
    });

      overlay.className = "gdrive-modal-overlay";

      const modal = document.createElement("div");
      modal.className = "gdrive-modal";

      modal.innerHTML = `
        <h3>导出到 Google Drive</h3>
        <p style="text-align:left;font-size:12px;line-height:1.6;margin-bottom:12px;">
          请先在 <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:#4285f4;">Google Cloud Console</a> 完成以下设置：<br>
          1. 启用 <a href="https://console.developers.google.com/apis/api/drive.googleapis.com/overview" target="_blank" style="color:#4285f4;">Google Drive API</a><br>
          2. 创建 OAuth 2.0 客户端 ID，类型选 <b>Web 应用</b><br>
          3. 在"已获授权的 JavaScript 来源"添加 <code style="font-size:11px;">https://chenjiamian.github.io</code><br>
          4. 复制客户端 ID 粘贴到下方
        </p>
        ${!storedClientId ? '<input id="gdriveClientIdInput" type="text" placeholder="例如: 123456-xxx.apps.googleusercontent.com">' : ""}
        <div class="gdrive-modal-buttons">
          ${storedClientId ? '<button class="gdrive-modal-btn cancel-btn" id="gdriveResetBtn" style="background:#d14b38;color:#fff;">重置ID</button>' : ""}
          <button class="gdrive-modal-btn cancel-btn" id="gdriveCancelBtn">取消</button>
          <button class="gdrive-modal-btn confirm-btn" id="gdriveConfirmBtn">${storedClientId ? "确认导出" : "保存并授权"}</button>
        </div>
      `;

      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      document.getElementById("gdriveCancelBtn").addEventListener("click", function () {
        document.body.removeChild(overlay);
      });

      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) {
          document.body.removeChild(overlay);
        }
      });

      const resetBtn = document.getElementById("gdriveResetBtn");
      if (resetBtn) {
        resetBtn.addEventListener("click", function () {
          window.localStorage.removeItem(GDRIVE_CLIENT_ID_KEY);
          document.body.removeChild(overlay);
          showGDriveModal(null);
        });
      }

      document.getElementById("gdriveConfirmBtn").addEventListener("click", function () {
        let clientId = storedClientId;
        if (!clientId) {
          clientId = document.getElementById("gdriveClientIdInput").value.trim();
          if (!clientId) {
            alert("请输入有效的 Client ID");
            return;
          }
          window.localStorage.setItem(GDRIVE_CLIENT_ID_KEY, clientId);
        }
        document.body.removeChild(overlay);
        exportToGoogleDrive(clientId);
      });
    }

    function exportToGoogleDrive(clientId) {
      const SCOPES = "https://www.googleapis.com/auth/drive.file";
      const data = {
        unitMinutes: loadStoredUnitMinutes(),
        birthDate: window.localStorage.getItem(BIRTH_STORAGE_KEY),
        zones: zones,
        countdowns: countdowns,
        exportTime: new Date().toISOString()
      };
      const jsonStr = JSON.stringify(data, null, 2);
      const fileName = "workday-dashboard-backup-" + new Date().toISOString().slice(0, 10) + ".json";

      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: SCOPES,
        callback: function (response) {
          if (response.error) {
            alert("授权失败: " + response.error);
            return;
          }
          uploadToDrive(response.access_token, jsonStr, fileName);
        }
      });

      tokenClient.requestAccessToken();
    }

    function uploadToDrive(accessToken, content, fileName) {
      const metadata = {
        name: fileName,
        mimeType: "application/json"
      };

      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
      form.append("file", new Blob([content], { type: "application/json" }));

      fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
        method: "POST",
        headers: new Headers({ Authorization: "Bearer " + accessToken }),
        body: form
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.id) {
            alert("导出成功！文件已保存到 Google Drive");
          } else {
            alert("导出失败: " + (data.error ? data.error.message : "未知错误"));
          }
        })
        .catch(function (e) {
          alert("导出失败: " + e.message);
        });
    }

    document.getElementById("importBtn").addEventListener("click", function () {
      document.getElementById("importInput").click();
    });

    document.getElementById("importInput").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (event) {
        importData(event.target.result);
      };
      reader.readAsText(file);
      e.target.value = "";
    });
  </script>
</body>
</html>
